<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Admin SMAP</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="config.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 24px 16px;
      font-size: 13px;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1140px;
      margin: 0 auto;
    }

    #login-box {
      max-width: 360px;
      margin: 80px auto;
      background: white;
      padding: 36px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
    }

    #login-box h2 {
      font-size: 17px;
      margin-bottom: 20px;
      color: #1a237e;
    }

    #login-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s;
    }

    #login-box input:focus {
      outline: none;
      border-color: #1a73e8;
    }

    #err {
      color: #c5221f;
      font-size: 12px;
      margin-top: 6px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      margin-bottom: 20px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat {
      background: white;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      border-left: 4px solid #1a73e8;
    }

    .stat .n {
      font-size: 32px;
      font-weight: bold;
      color: #1a237e;
    }

    .stat .l {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .stat.hijau {
      border-left-color: #34a853;
    }

    .stat.hijau .n {
      color: #137333;
    }

    .stat.oren {
      border-left-color: #fbbc04;
    }

    .stat.oren .n {
      color: #a06b00;
    }

    .grafik-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 680px) {
      .grafik-wrap {
        grid-template-columns: 1fr;
      }
    }

    .grafik-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
    }

    .grafik-card h3 {
      font-size: 13px;
      color: #444;
      margin-bottom: 14px;
    }

    .chart-container {
      position: relative;
      height: 240px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      padding: 7px 10px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }

    .toolbar input:focus,
    .toolbar select:focus {
      outline: none;
      border-color: #1a73e8;
    }

    .toolbar input {
      width: 200px;
    }

    .toolbar select {
      min-width: 180px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      font-size: 13px;
      font-family: Arial, sans-serif;
      transition: all 0.15s;
      background: white;
      white-space: nowrap;
    }

    .btn:hover {
      opacity: 0.82;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }

    .btn-pdf {
      background: #e8f0fe;
      color: #1a73e8;
      border-color: #c5d8fb;
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-hapus {
      background: #fce8e6;
      color: #c5221f;
      border-color: #f5c6c6;
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-csv {
      background: #e6f4ea;
      color: #137333;
      border-color: #c8e6c9;
    }

    .btn-rekap {
      background: #fff3e0;
      color: #e65100;
      border-color: #ffcc80;
    }

    .btn i {
      font-size: 14px;
    }

    .btn-pdf i,
    .btn-hapus i {
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f8f9fa;
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      border-bottom: 2px solid #e8eaed;
      color: #444;
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fafbfc;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: #e8f0fe;
      color: #1a73e8;
    }

    #modal-hapus {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    #modal-hapus.aktif {
      display: flex;
    }

    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 32px 28px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .modal-box .micon {
      font-size: 36px;
      color: #c5221f;
      margin-bottom: 10px;
    }

    .modal-box h3 {
      font-size: 15px;
      color: #c5221f;
      margin-bottom: 8px;
    }

    .modal-box p {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .modal-btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-btn-row .btn {
      min-width: 110px;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div id="login-box">
      <h2 style="display:flex;align-items:center;gap:8px">
        <i class="bi bi-shield-lock" style="color:#1a237e;font-size:20px"></i>
        Login Admin SMAP
      </h2>
      <input type="password" id="pass" placeholder="Password admin" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-primary" onclick="login()" style="width:100%;justify-content:center;padding:10px">
        <i class="bi bi-box-arrow-in-right"></i> Masuk
      </button>
      <div id="err"></div>
    </div>

    <div id="dashboard" style="display:none">

      <div
        style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:18px;font-weight:bold;color:#1a237e;display:flex;align-items:center;gap:6px">
            <i class="bi bi-speedometer2"></i> Dashboard Admin SMAP
          </div>
          <div style="font-size:12px;color:#888;margin-top:2px">PT IDSurvey (Persero)</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-rekap" onclick="cetakRekapSemua()">
            <i class="bi bi-file-earmark-pdf"></i> Rekap Semua TTD
          </button>
          <button class="btn btn-primary" onclick="muat()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat">
          <div class="n" id="s-total">0</div>
          <div class="l"><i class="bi bi-people-fill"></i> Total Pengisian</div>
        </div>
        <div class="stat hijau">
          <div class="n" id="s-hari">0</div>
          <div class="l"><i class="bi bi-calendar-check-fill"></i> Hari Ini</div>
        </div>
        <div class="stat oren">
          <div class="n" id="s-unit">0</div>
          <div class="l"><i class="bi bi-building-fill"></i> Unit Kerja Aktif</div>
        </div>
        <div class="stat">
          <div class="n" id="s-minggu">0</div>
          <div class="l"><i class="bi bi-calendar-week-fill"></i> Minggu Ini</div>
        </div>
      </div>

      <div class="grafik-wrap">
        <div class="grafik-card">
          <h3><i class="bi bi-bar-chart-horizontal-fill"></i> Rekap per Unit Kerja</h3>
          <div class="chart-container"><canvas id="chartUnit"></canvas></div>
        </div>
        <div class="grafik-card">
          <h3><i class="bi bi-graph-up-arrow"></i> Tren Pengisian (7 Hari Terakhir)</h3>
          <div class="chart-container"><canvas id="chartTren"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <input id="cari" placeholder="Cari nama..." oninput="renderTable()">
          <select id="filter-unit" onchange="renderTable()">
            <option value="">Semua Unit Kerja</option>
            <option>Deputi Direktur Strategi dan Transformasi Korporat</option>
            <option>Deputi Direktur Pemasaran dan Kelembagaan</option>
            <option>Departemen Manajemen Portofolio</option>
            <option>Divisi Pengembangan Korporat</option>
            <option>Divisi Pengawasan Intern</option>
            <option>Divisi Sekretaris Perusahaan</option>
            <option>Divisi Integrasi Sistem Dan Proses Bisnis</option>
            <option>Divisi Perencanaan dan Keuangan Korporat</option>
            <option>Divisi Akuntansi Keuangan dan Pajak</option>
            <option>Divisi Manajemen Risiko dan Keberlanjutan</option>
            <option>Divisi Teknologi Informasi</option>
            <option>Divisi Riset dan Pengembangan Produk</option>
            <option>Divisi Pemasaran Korporat</option>
            <option>Divisi Relasi Kelembagaan</option>
            <option>Divisi Human Capital</option>
            <option>Divisi Pengadaan, Umum dan Manajemen Aset</option>
            <option>Unit TJSL</option>
          </select>
          <button class="btn btn-csv" onclick="downloadCSV()">
            <i class="bi bi-download"></i> CSV
          </button>
        </div>

        <div id="loading" style="text-align:center;padding:40px;color:#999">
          <i class="bi bi-hourglass-split"></i> Memuat data...
        </div>
        <table id="tbl" style="display:none">
          <thead>
            <tr>
              <th>No</th>
              <th>Waktu Submit</th>
              <th>Nama</th>
              <th>Jabatan</th>
              <th>Unit Kerja</th>
              <th>Tempat</th>
              <th>Tgl TTD</th>
              <th>PDF</th>
              <th>Hapus</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="modal-hapus">
      <div class="modal-box">
        <div class="micon"><i class="bi bi-trash3-fill"></i></div>
        <h3>Hapus Data?</h3>
        <p id="modal-pesan"></p>
        <div class="modal-btn-row">
          <button class="btn" onclick="tutupModal()"><i class="bi bi-x-lg"></i> Batal</button>
          <button class="btn btn-hapus" id="modal-ok-btn"><i class="bi bi-trash3"></i> Ya, Hapus</button>
        </div>
      </div>
    </div>

    <script>
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let allData = [];
      let chartUnit = null, chartTren = null;

      function loadImgBase64(url) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            const c = document.createElement('canvas');
            c.width = img.naturalWidth; c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve({ data: c.toDataURL('image/png'), w: img.naturalWidth, h: img.naturalHeight });
          };
          img.onerror = () => resolve(null);
          img.src = url;
        });
      }

      async function gambarHeaderPDF(pdf, imgDanantara, imgIDSurvey) {
        const W = 210, margin = 20;
        let y = 12;
        const logoH = 13, logoMaxW = 44;

        if (imgDanantara) {
          const ratio = imgDanantara.w / imgDanantara.h;
          const lw = Math.min(logoMaxW, logoH * ratio);
          pdf.addImage(imgDanantara.data, 'PNG', margin, y, lw, logoH, undefined, 'FAST');
        } else {
          pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
          pdf.setTextColor(0, 0, 0); pdf.text('Danantara Indonesia', margin, y + 7);
        }

        if (imgIDSurvey) {
          const ratio = imgIDSurvey.w / imgIDSurvey.h;
          const lw = Math.min(logoMaxW, logoH * ratio);
          pdf.addImage(imgIDSurvey.data, 'PNG', W - margin - lw, y, lw, logoH, undefined, 'FAST');
        } else {
          pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
          pdf.setTextColor(0, 0, 0); pdf.text('IDSurvey', W - margin - 18, y + 7);
        }

        y += logoH + 3;
        pdf.setDrawColor(0); pdf.setLineWidth(0.5);
        pdf.line(margin, y, W - margin, y);
        y += 5;
        return y;
      }

      function tulisIsiSurat(pdf, d, yStart) {
        const W = 210, margin = 20, contentW = W - margin * 2;
        let y = yStart;

        pdf.setTextColor(0, 0, 0);

        pdf.setFont('helvetica', 'bold'); pdf.setFontSize(10.5);
        pdf.text('SURAT PERNYATAAN', W / 2, y, { align: 'center' }); y += 5;
        pdf.text('PEMAHAMAN DAN PENERAPAN KEBIJAKAN SMAP', W / 2, y, { align: 'center' }); y += 3;
        pdf.setLineWidth(0.35); pdf.setDrawColor(0);
        pdf.line(margin, y, W - margin, y); y += 5.5;

        pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9.5);
        pdf.text('Saya yang bertanda tangan di bawah ini:', margin, y); y += 5.5;

        const colSep = margin + 26, colVal = colSep + 4;
        [['Nama', d.nama], ['Jabatan', d.jabatan], ['Unit Kerja', d.unit_kerja]].forEach(([lbl, val]) => {
          pdf.setFont('helvetica', 'bold'); pdf.text(lbl, margin, y);
          pdf.setFont('helvetica', 'normal'); pdf.text(':', colSep, y);
          const lines = pdf.splitTextToSize(val || '-', contentW - (colVal - margin));
          pdf.text(lines, colVal, y);
          y += lines.length > 1 ? lines.length * 4.8 : 5;
        });
        y += 2.5;

        pdf.setFont('helvetica', 'normal');
        pdf.text('Dengan ini menyatakan bahwa:', margin, y); y += 5;

        const poin = [
          'Saya telah menerima, membaca, dan memahami kebijakan Sistem Manajemen Anti Penyuapan (SMAP) yang ditandatangani oleh jajaran Komisaris dan Direksi PT IDSurvey (Persero).',
          'Saya bersedia dan berkomitmen untuk menjalankan serta mematuhi kebijakan SMAP dalam setiap pelaksanaan tugas dan tanggung jawab pekerjaan.',
          'Saya tidak akan melakukan tindakan yang mengarah pada penyuapan, gratifikasi, atau pelanggaran etika lainnya, serta akan menjaga integritas dalam bekerja.',
          'Saya bersedia melaporkan setiap indikasi pelanggaran SMAP sesuai dengan mekanisme yang telah ditetapkan.',
          'Saya memahami bahwa pelanggaran terhadap kebijakan SMAP akan dikenakan sanksi sesuai dengan ketentuan yang berlaku di perusahaan.',
        ];
        poin.forEach((p, idx) => {
          const lines = pdf.splitTextToSize(p, contentW - 6);
          pdf.text((idx + 1) + '.', margin, y);
          pdf.text(lines, margin + 6, y);
          y += lines.length * 4.8 + 0.8;
        });
        y += 2.5;

        const penutup = pdf.splitTextToSize(
          'Demikian surat pernyataan ini saya buat dengan sebenar-benarnya dan tanpa paksaan dari pihak manapun.',
          contentW
        );
        pdf.text(penutup, margin, y); y += penutup.length * 4.8 + 5;

        let tglFmt = d.tanggal || '';
        try {
          if (d.tanggal) tglFmt = new Date(d.tanggal + 'T00:00:00')
            .toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch (e) { }

        const ttdCX = W - margin - 30;
        pdf.setFontSize(9.5);
        pdf.text((d.tempat || 'Jakarta') + ', ' + tglFmt, ttdCX, y, { align: 'center' }); y += 4;
        pdf.text('Yang menyatakan,', ttdCX, y, { align: 'center' }); y += 2.5;

        if (d.ttd && d.ttd.startsWith('data:image')) {
          try { pdf.addImage(d.ttd, 'PNG', ttdCX - 22, y, 44, 17); y += 18; }
          catch (e) { y += 18; }
        } else { y += 18; }

        pdf.setLineWidth(0.25); pdf.setDrawColor(0);
        pdf.line(ttdCX - 25, y, ttdCX + 25, y); y += 4;
        pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9.5);
        pdf.text(d.nama || '', ttdCX, y, { align: 'center' });
        y += 2;

        return y;
      }

      function login() {
        const p = document.getElementById('pass').value;
        if (!p) { document.getElementById('err').innerText = 'Masukkan password.'; return; }
        if (p !== ADMIN_PASSWORD) { document.getElementById('err').innerText = 'Password salah.'; return; }
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        muat();
      }

      async function muat() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('tbl').style.display = 'none';
        const { data, error } = await sb.from('smap_data').select('*').order('created_at', { ascending: false });
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tbl').style.display = 'table';
        if (error) {
          document.getElementById('tbody').innerHTML =
            '<tr><td colspan="9" style="color:red;text-align:center;padding:20px">Gagal memuat: ' + error.message + '</td></tr>';
          return;
        }
        allData = data || [];
        hitungStat(); renderGrafik(); renderTable();
      }

      function hitungStat() {
        const now = new Date(), todayStr = now.toLocaleDateString('id-ID');
        const startMinggu = new Date(now); startMinggu.setDate(now.getDate() - 6); startMinggu.setHours(0, 0, 0, 0);
        document.getElementById('s-total').innerText = allData.length;
        document.getElementById('s-hari').innerText = allData.filter(d => d.created_at && new Date(d.created_at).toLocaleDateString('id-ID') === todayStr).length;
        document.getElementById('s-unit').innerText = new Set(allData.map(d => d.unit_kerja)).size;
        document.getElementById('s-minggu').innerText = allData.filter(d => d.created_at && new Date(d.created_at) >= startMinggu).length;
      }

      function renderGrafik() {
        const uc = {};
        allData.forEach(d => { const u = d.unit_kerja || 'Lainnya'; uc[u] = (uc[u] || 0) + 1; });
        const su = Object.entries(uc).sort((a, b) => b[1] - a[1]);
        const colors = su.map((_, i) => `hsla(${220 + i * 8},70%,${55 - i * 2}%,0.85)`);

        if (chartUnit) chartUnit.destroy();
        chartUnit = new Chart(document.getElementById('chartUnit'), {
          type: 'bar',
          data: { labels: su.map(x => x[0].length > 28 ? x[0].substring(0, 26) + '…' : x[0]), datasets: [{ label: 'Jumlah', data: su.map(x => x[1]), backgroundColor: colors, borderRadius: 5 }] },
          options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' } }, y: { ticks: { font: { size: 10 } } } } }
        });

        const h7 = [], c7 = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          h7.push(d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }));
          const s = d.toLocaleDateString('id-ID');
          c7.push(allData.filter(x => x.created_at && new Date(x.created_at).toLocaleDateString('id-ID') === s).length);
        }
        if (chartTren) chartTren.destroy();
        chartTren = new Chart(document.getElementById('chartTren'), {
          type: 'line',
          data: { labels: h7, datasets: [{ label: 'Pengisian', data: c7, borderColor: '#1a73e8', backgroundColor: 'rgba(26,115,232,0.1)', borderWidth: 2.5, fill: true, tension: 0.35, pointBackgroundColor: '#1a73e8', pointRadius: 4 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' }, min: 0 }, x: { grid: { display: false } } } }
        });
      }

      function renderTable() {
        const q = document.getElementById('cari').value.toLowerCase();
        const fu = document.getElementById('filter-unit').value;
        const filtered = allData.filter(d =>
          (!q || (d.nama && d.nama.toLowerCase().includes(q))) && (!fu || d.unit_kerja === fu)
        );
        if (!filtered.length) {
          document.getElementById('tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;color:#999;padding:30px">Tidak ada data</td></tr>';
          return;
        }
        document.getElementById('tbody').innerHTML = filtered.map((d, i) => {
          const ts = d.created_at ? new Date(d.created_at).toLocaleString('id-ID') : '-';
          return `<tr>
      <td>${i + 1}</td>
      <td style="white-space:nowrap">${ts}</td>
      <td><strong>${d.nama || '-'}</strong></td>
      <td>${d.jabatan || '-'}</td>
      <td><span class="badge">${d.unit_kerja || '-'}</span></td>
      <td>${d.tempat || '-'}</td>
      <td>${d.tanggal || '-'}</td>
      <td><button class="btn btn-pdf" onclick="cetakPDF('${d.id}')"><i class="bi bi-printer-fill"></i> PDF</button></td>
      <td><button class="btn btn-hapus" onclick="konfirmasiHapus('${d.id}','${(d.nama || '').replace(/'/g, "\\'")}')"><i class="bi bi-trash3-fill"></i> Hapus</button></td>
    </tr>`;
        }).join('');
      }

      async function cetakPDF(id) {
        const d = allData.find(x => x.id == id);
        if (!d) { alert('Data tidak ditemukan.'); return; }

        const [imgD, imgI] = await Promise.all([
          loadImgBase64('images/danantara.png'),
          loadImgBase64('images/idsurvey.png')
        ]);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
        const y = await gambarHeaderPDF(pdf, imgD, imgI);
        tulisIsiSurat(pdf, d, y);
        pdf.save('Surat_SMAP_' + (d.nama || 'unknown').replace(/\s+/g, '_') + '.pdf');
      }

      async function cetakRekapSemua() {
        if (!allData.length) { alert('Belum ada data.'); return; }

        const [imgD, imgI] = await Promise.all([
          loadImgBase64('images/danantara.png'),
          loadImgBase64('images/idsurvey.png')
        ]);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: 'mm', format: 'a4' });

        const W = 210, pageH = 297;
        const marginX = 15, marginBottom = 14;
        const COLS = 4;           
        const colW = (W - marginX * 2) / COLS;  
        const ttdH = 18;         
        const cellH = ttdH + 16;  

        let y = await gambarHeaderPDF(pdf, imgD, imgI);

        pdf.setTextColor(0, 0, 0);
        pdf.setFont('helvetica', 'bold'); pdf.setFontSize(11);
        pdf.text('REKAP TANDA TANGAN', W / 2, y, { align: 'center' }); y += 5.5;
        pdf.text('SURAT PERNYATAAN KEBIJAKAN SMAP', W / 2, y, { align: 'center' }); y += 4;
        pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8.5);
        pdf.text(
          'PT IDSurvey (Persero)  \u2014  Total: ' + allData.length + ' orang  \u2014  Dicetak: ' +
          new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }),
          W / 2, y, { align: 'center' }
        );
        y += 4;
        pdf.setLineWidth(0.4); pdf.setDrawColor(0);
        pdf.line(marginX, y, W - marginX, y); y += 5;

        const startY = y; 
        for (let i = 0; i < allData.length; i++) {
          const d = allData[i];
          const col = i % COLS;
          const row = Math.floor(i / COLS);

          const itemsPerPage1 = Math.floor((pageH - startY - marginBottom) / cellH) * COLS;
          const itemsPerPageN = Math.floor((pageH - 38 - marginBottom) / cellH) * COLS; 

          let localIdx, pageNum, localRow, localStartY;
          if (i < itemsPerPage1) {
            pageNum = 1;
            localIdx = i;
            localRow = Math.floor(localIdx / COLS);
            localStartY = startY;
          } else {
            const rem = i - itemsPerPage1;
            pageNum = 2 + Math.floor(rem / itemsPerPageN);
            localIdx = rem % itemsPerPageN;
            localRow = Math.floor(localIdx / COLS);
            localStartY = 38; 
          }

          const curPage = pdf.internal.getNumberOfPages();
          while (curPage < pageNum) { pdf.addPage(); }
          if (curPage > pageNum) {
          }

          if (pageNum > 1 && localIdx === 0 && col === 0) {
            pdf.setPage(pageNum);
            const hY = await gambarHeaderPDF(pdf, imgD, imgI);
          }

          pdf.setPage(pageNum);

          const cellX = marginX + col * colW;
          const cellY = localStartY + localRow * cellH;

          pdf.setDrawColor(210); pdf.setLineWidth(0.2);
          pdf.rect(cellX, cellY, colW, cellH);
          pdf.setDrawColor(0);

          pdf.setFont('helvetica', 'normal'); pdf.setFontSize(7); pdf.setTextColor(160);
          pdf.text(String(i + 1), cellX + 1.5, cellY + 4);
          pdf.setTextColor(0);

          const ttdAreaY = cellY + 3;
          if (d.ttd && d.ttd.startsWith('data:image')) {
            try {
              const ttdW = colW - 8;
              const ttdX = cellX + 4;
              pdf.addImage(d.ttd, 'PNG', ttdX, ttdAreaY, ttdW, ttdH - 2, undefined, 'FAST');
            } catch (e) { }
          }

          const garisY = cellY + ttdH + 4;
          pdf.setLineWidth(0.3); pdf.setDrawColor(0);
          pdf.line(cellX + 3, garisY, cellX + colW - 3, garisY);

          pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(0);
          const namaLines = pdf.splitTextToSize(d.nama || '-', colW - 4);
          const namaShow = namaLines.slice(0, 2);
          namaShow.forEach((line, li) => {
            pdf.text(line, cellX + colW / 2, garisY + 3.5 + li * 4, { align: 'center' });
          });
        }

        const totalHal = pdf.internal.getNumberOfPages();
        for (let p = 1; p <= totalHal; p++) {
          pdf.setPage(p);
          pdf.setFont('helvetica', 'normal'); pdf.setFontSize(7.5); pdf.setTextColor(150);
          pdf.text('Halaman ' + p + ' dari ' + totalHal, W / 2, pageH - 6, { align: 'center' });
        }

        pdf.save('Rekap_TTD_SMAP_' + new Date().toLocaleDateString('id-ID').replace(/\//g, '-') + '.pdf');
      }

      function konfirmasiHapus(id, nama) {
        document.getElementById('modal-pesan').innerText =
          'Data milik "' + nama + '" akan dihapus permanen.\nOrang tersebut dapat mengisi kembali setelah dihapus.';
        document.getElementById('modal-ok-btn').onclick = () => eksekusiHapus(id);
        document.getElementById('modal-hapus').classList.add('aktif');
      }
      function tutupModal() { document.getElementById('modal-hapus').classList.remove('aktif'); }
      document.getElementById('modal-hapus').addEventListener('click', function (e) { if (e.target === this) tutupModal(); });

      async function eksekusiHapus(id) {
        tutupModal();
        const { error } = await sb.from('smap_data').delete().eq('id', id);
        if (error) { alert('Gagal hapus: ' + error.message); return; }
        muat();
      }

      function downloadCSV() {
        if (!allData.length) { alert('Belum ada data.'); return; }
        const baris = [['No', 'Waktu Submit', 'Nama', 'Jabatan', 'Unit Kerja', 'Tempat', 'Tanggal TTD']];
        allData.forEach((d, i) => {
          baris.push([i + 1, d.created_at ? new Date(d.created_at).toLocaleString('id-ID') : '', d.nama, d.jabatan, d.unit_kerja, d.tempat, d.tanggal]);
        });
        const csv = baris.map(r => r.map(c => '"' + String(c || '').replace(/"/g, '""') + '"').join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = 'Data_SMAP_' + new Date().toLocaleDateString('id-ID').replace(/\//g, '-') + '.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      }
    </script>
</body>
